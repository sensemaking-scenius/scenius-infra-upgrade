<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,400;0,500;0,600;1,400&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0c0c0f;
      --surface: #16161b;
      --border: #2a2a33;
      --text: #c8c8d0;
      --text-dim: #6e6e7a;
      --text-bright: #e8e8ee;
      --accent: #7a9e6c;
      --accent-dim: #4a6840;
      --tag: #3d3d4a;
      --mono: 'IBM Plex Mono', monospace;
      --sans: 'IBM Plex Sans', sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
    }

    .container {
      max-width: 860px;
      margin: 0 auto;
      padding: 3rem 1.5rem;
    }

    header {
      border-bottom: 1px solid var(--border);
      padding-bottom: 1.5rem;
      margin-bottom: 2.5rem;
    }

    header .site-title {
      font-family: var(--mono);
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--text-dim);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    header .site-title a {
      color: inherit;
      text-decoration: none;
    }

    header .site-title a:hover { color: var(--accent); }

    header .site-desc {
      font-family: var(--mono);
      font-size: 0.75rem;
      color: var(--text-dim);
      margin-top: 0.25rem;
      opacity: 0.6;
    }

    /* Index page */
    .session-list { list-style: none; }

    .session-card {
      border: 1px solid var(--border);
      background: var(--surface);
      padding: 1.25rem 1.5rem;
      margin-bottom: 0.75rem;
      text-decoration: none;
      display: block;
      transition: border-color 0.15s;
    }

    .session-card:hover {
      border-color: var(--accent-dim);
    }

    .session-card .title {
      font-family: var(--sans);
      font-size: 1rem;
      font-weight: 600;
      color: var(--text-bright);
      margin-bottom: 0.5rem;
    }

    .session-card .meta {
      font-family: var(--mono);
      font-size: 0.75rem;
      color: var(--text-dim);
      display: flex;
      gap: 1.5rem;
      flex-wrap: wrap;
    }

    .session-card .meta span::before {
      content: '';
      display: inline-block;
      width: 4px;
      height: 4px;
      background: var(--accent-dim);
      border-radius: 50%;
      margin-right: 0.4rem;
      vertical-align: middle;
    }

    .status-active { color: var(--accent); }
    .status-completed { color: var(--text-dim); }

    .empty {
      font-family: var(--mono);
      font-size: 0.85rem;
      color: var(--text-dim);
      padding: 3rem 0;
      text-align: center;
    }

    /* Session page */
    .session-header {
      margin-bottom: 2rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid var(--border);
    }

    .session-header h1 {
      font-family: var(--sans);
      font-size: 1.4rem;
      font-weight: 600;
      color: var(--text-bright);
      line-height: 1.3;
      margin-bottom: 0.75rem;
    }

    .session-header .meta {
      font-family: var(--mono);
      font-size: 0.75rem;
      color: var(--text-dim);
      display: flex;
      gap: 1.5rem;
      flex-wrap: wrap;
    }

    .back-link {
      font-family: var(--mono);
      font-size: 0.75rem;
      color: var(--text-dim);
      text-decoration: none;
      display: inline-block;
      margin-bottom: 1.5rem;
    }

    .back-link:hover { color: var(--accent); }
    .back-link::before { content: '<- '; }

    .session-content h1 { display: none; }

    .session-content h2 {
      font-family: var(--mono);
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--accent);
      letter-spacing: 0.04em;
      text-transform: uppercase;
      margin-top: 2.5rem;
      margin-bottom: 1rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    .session-content h3 {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text-bright);
      margin-top: 1.5rem;
      margin-bottom: 0.5rem;
    }

    .session-content h4 {
      font-family: var(--mono);
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--text-dim);
      margin-top: 1.25rem;
      margin-bottom: 0.5rem;
    }

    .session-content p {
      margin-bottom: 1rem;
      color: var(--text);
    }

    .session-content strong {
      color: var(--text-bright);
      font-weight: 600;
    }

    .session-content em {
      color: var(--text-dim);
      font-style: italic;
    }

    .session-content ul, .session-content ol {
      margin-bottom: 1rem;
      padding-left: 1.25rem;
    }

    .session-content li {
      margin-bottom: 0.35rem;
    }

    .session-content blockquote {
      border-left: 2px solid var(--accent-dim);
      padding: 0.5rem 1rem;
      margin: 1rem 0;
      background: var(--surface);
      color: var(--text-dim);
      font-style: italic;
    }

    .session-content hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 2rem 0;
    }

    .session-content code {
      font-family: var(--mono);
      font-size: 0.85em;
      background: var(--surface);
      padding: 0.15em 0.4em;
      border: 1px solid var(--border);
    }

    .session-content pre {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 1rem;
      overflow-x: auto;
      margin-bottom: 1rem;
    }

    .session-content pre code {
      background: none;
      border: none;
      padding: 0;
    }

    .session-content a {
      color: var(--accent);
      text-decoration: none;
    }

    .session-content a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="site-title"><a href="{{ '/' | relative_url }}">{{ site.title }}</a></div>
      <div class="site-desc">{{ site.description }}</div>
    </header>
    <main>
      {{ content }}
    </main>
  </div>
</body>
</html>
