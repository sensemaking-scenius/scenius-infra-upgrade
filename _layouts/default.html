<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Calistoga&family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --mint: #81D7C0;
      --mint-dark: #5bbfa3;
      --mint-deep: #3a9e84;
      --mint-light: #a8e6d5;
      --pink: #CF5CD7;
      --pink-soft: #e8a5ec;
      --pink-glow: rgba(207,92,215,0.12);
      --cream: #f4f1eb;
      --ink: #1a1a2e;
      --ink-soft: #3d3d56;
      --ink-muted: #6b6b85;
      --white: #ffffff;
      --serif: 'Calistoga', serif;
      --sans: 'DM Sans', sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: var(--sans);
      background: var(--mint);
      color: var(--ink);
      line-height: 1.6;
      min-height: 100vh;
      position: relative;
    }

    /* Subtle noise texture overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      opacity: 0.035;
      pointer-events: none;
      z-index: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 200px 200px;
    }

    /* Organic decorative blobs */
    body::after {
      content: '';
      position: fixed;
      top: -120px;
      right: -80px;
      width: 400px;
      height: 400px;
      background: radial-gradient(ellipse at center, rgba(207,92,215,0.08) 0%, transparent 70%);
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
    }

    .container {
      max-width: 920px;
      margin: 0 auto;
      padding: 2.5rem 1.5rem;
      position: relative;
      z-index: 1;
    }

    /* Entrance animations */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes scaleIn {
      from { opacity: 0; transform: scale(0.92); }
      to { opacity: 1; transform: scale(1); }
    }

    .animate-in {
      animation: fadeUp 0.5s ease-out both;
    }

    /* Header */
    header {
      text-align: center;
      padding: 2rem 0 2.5rem;
      animation: fadeIn 0.6s ease-out both;
    }

    header .site-title {
      font-family: var(--serif);
      font-size: 2.2rem;
      color: var(--ink);
      line-height: 1.2;
    }

    header .site-title a {
      color: inherit;
      text-decoration: none;
      transition: color 0.2s;
    }

    header .site-title a:hover {
      color: var(--mint-deep);
    }

    header .site-desc {
      font-size: 1rem;
      color: var(--ink-soft);
      margin-top: 0.5rem;
      font-style: italic;
    }

    .github-link {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      margin-top: 0.75rem;
      font-size: 0.78rem;
      font-weight: 500;
      color: var(--ink-muted);
      text-decoration: none;
      padding: 0.3rem 0.75rem;
      border-radius: 999px;
      border: 1.5px solid rgba(27,27,46,0.12);
      transition: all 0.25s ease;
      background: rgba(255,255,255,0.15);
    }

    .github-link:hover {
      color: var(--ink);
      border-color: var(--pink-soft);
      background: rgba(232,165,236,0.12);
    }

    .github-link svg {
      width: 14px;
      height: 14px;
      fill: currentColor;
      flex-shrink: 0;
    }

    /* Navigation pills */
    .nav-pills {
      display: flex;
      justify-content: center;
      gap: 0.5rem;
      margin-bottom: 2.5rem;
    }

    .nav-pill {
      font-family: var(--sans);
      font-size: 0.8rem;
      font-weight: 600;
      padding: 0.4rem 1rem;
      border-radius: 999px;
      border: 2px solid var(--ink);
      background: transparent;
      color: var(--ink);
      text-decoration: none;
      transition: all 0.2s;
    }

    .nav-pill:hover, .nav-pill--active {
      background: var(--ink);
      color: var(--mint);
    }

    /* CTA Banner */
    .cta-banner {
      background: var(--pink);
      color: var(--white);
      padding: 1.75rem 2rem;
      margin-bottom: 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1.5rem;
      border-radius: 12px;
      position: relative;
      overflow: hidden;
      animation: scaleIn 0.5s ease-out 0.1s both;
    }

    .cta-banner::before {
      content: '';
      position: absolute;
      top: -40px;
      right: -40px;
      width: 160px;
      height: 160px;
      background: rgba(255,255,255,0.08);
      border-radius: 50%;
    }

    .cta-banner::after {
      content: '';
      position: absolute;
      bottom: -20px;
      left: 30%;
      width: 80px;
      height: 80px;
      background: rgba(255,255,255,0.05);
      border-radius: 50%;
    }

    .cta-label {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      opacity: 0.85;
      margin-bottom: 0.25rem;
    }

    .cta-title {
      font-family: var(--serif);
      font-size: 1.15rem;
      margin-bottom: 0.25rem;
    }

    .cta-desc {
      font-size: 0.85rem;
      opacity: 0.85;
    }

    .cta-button {
      font-family: var(--sans);
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--pink);
      background: var(--white);
      padding: 0.65rem 1.75rem;
      text-decoration: none;
      white-space: nowrap;
      border-radius: 999px;
      transition: transform 0.15s, box-shadow 0.15s;
      position: relative;
      z-index: 1;
    }

    .cta-button:hover {
      transform: scale(1.05);
      box-shadow: 0 4px 20px rgba(0,0,0,0.15);
    }

    @media (max-width: 560px) {
      .cta-banner { flex-direction: column; align-items: flex-start; }
    }

    /* Stats bar */
    .stats-bar {
      display: flex;
      gap: 2.5rem;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 2.5rem;
      padding: 1.5rem 2rem;
      background: rgba(255,255,255,0.4);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.5);
      animation: fadeUp 0.5s ease-out 0.2s both;
    }

    .stat {
      text-align: center;
    }

    .stat-value {
      font-family: var(--serif);
      font-size: 2rem;
      color: var(--ink);
      line-height: 1;
    }

    .stat-label {
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--ink-muted);
      margin-top: 0.3rem;
    }

    /* Consensus block */
    .consensus {
      background: var(--white);
      padding: 2rem 2.25rem;
      margin-bottom: 2rem;
      border-left: 5px solid var(--pink);
      border-radius: 0 12px 12px 0;
      position: relative;
      animation: fadeUp 0.5s ease-out 0.3s both;
    }

    .consensus::before {
      content: '';
      position: absolute;
      top: -1px;
      right: -1px;
      bottom: -1px;
      left: -6px;
      border-radius: 0 12px 12px 0;
      box-shadow: 0 2px 24px rgba(207,92,215,0.08);
      pointer-events: none;
    }

    .consensus-label {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--pink);
      margin-bottom: 0.65rem;
    }

    .consensus-text {
      font-family: var(--serif);
      font-size: 1.15rem;
      color: var(--ink);
      line-height: 1.5;
    }

    .consensus-detail {
      margin-top: 1.15rem;
      font-size: 0.88rem;
      color: var(--ink-soft);
      line-height: 1.6;
    }

    .consensus-detail ul {
      margin-top: 0.5rem;
      padding-left: 1.25rem;
    }

    .consensus-detail li {
      margin-bottom: 0.35rem;
    }

    .consensus-detail li::marker {
      color: var(--pink-soft);
    }

    /* Section headers */
    .section-header {
      font-family: var(--serif);
      font-size: 1.3rem;
      color: var(--ink);
      margin-bottom: 1rem;
      padding-bottom: 0.5rem;
      border-bottom: 2px solid var(--ink);
    }

    /* Activity section */
    .activity-section {
      margin-top: 2.5rem;
    }

    /* Activity cards */
    .activity-list { list-style: none; }

    .activity-card {
      background: var(--white);
      padding: 1.25rem 1.5rem;
      margin-bottom: 0.6rem;
      text-decoration: none;
      display: flex;
      align-items: flex-start;
      gap: 1rem;
      border-radius: 10px;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      border: 1px solid rgba(0,0,0,0.04);
    }

    .activity-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 24px rgba(26,26,46,0.08);
    }

    .activity-type {
      font-size: 0.65rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      padding: 0.25rem 0.7rem;
      border-radius: 999px;
      white-space: nowrap;
      flex-shrink: 0;
      margin-top: 0.15rem;
    }

    .activity-type--session {
      background: var(--pink-soft);
      color: var(--ink);
    }

    .activity-type--workshop {
      background: var(--mint-light);
      color: var(--ink);
    }

    .activity-type--artifact {
      background: var(--cream);
      color: var(--ink);
      border: 1px solid rgba(0,0,0,0.08);
    }

    .activity-info { flex: 1; min-width: 0; }

    .activity-title {
      font-family: var(--sans);
      font-size: 1rem;
      font-weight: 700;
      color: var(--ink);
      margin-bottom: 0.25rem;
    }

    .activity-meta {
      font-size: 0.78rem;
      color: var(--ink-muted);
    }

    .activity-meta span + span::before {
      content: ' / ';
      color: var(--ink-muted);
      opacity: 0.4;
    }

    /* Status badges */
    .status-active {
      color: var(--mint-deep);
      font-weight: 600;
    }

    .status-completed {
      color: var(--ink-muted);
      font-weight: 500;
    }

    /* Pulsing dot only on detail pages, not inside activity-meta separators */
    .detail-meta .status-active::after {
      content: '';
      display: inline-block;
      width: 6px;
      height: 6px;
      background: var(--mint-deep);
      border-radius: 50%;
      margin-left: 0.4em;
      vertical-align: middle;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* Participants */
    .participants-section {
      margin-top: 2.5rem;
    }

    .participant-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-top: 0.75rem;
    }

    .participant-chip {
      font-size: 0.8rem;
      font-weight: 500;
      padding: 0.4rem 0.9rem;
      background: var(--white);
      border-radius: 999px;
      color: var(--ink-soft);
      border: 1px solid rgba(0,0,0,0.06);
      transition: transform 0.12s;
    }

    .participant-chip:hover {
      transform: translateY(-1px);
    }

    /* Back link */
    .back-link {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--ink-soft);
      text-decoration: none;
      display: inline-block;
      margin-bottom: 1.5rem;
      transition: color 0.15s;
    }

    .back-link:hover { color: var(--pink); }
    .back-link::before { content: '\2190  '; }

    /* Session/workshop detail header */
    .detail-header {
      margin-bottom: 2rem;
      padding-bottom: 1.5rem;
      border-bottom: 2px solid var(--ink);
      animation: fadeUp 0.4s ease-out both;
    }

    .detail-header h1 {
      font-family: var(--serif);
      font-size: 1.6rem;
      color: var(--ink);
      line-height: 1.3;
      margin-bottom: 0.75rem;
    }

    .detail-meta {
      font-size: 0.8rem;
      color: var(--ink-muted);
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
    }

    /* Dashboard cards */
    .card-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.75rem;
      margin-bottom: 2rem;
    }

    @media (max-width: 640px) {
      .card-grid { grid-template-columns: 1fr; }
    }

    .dash-card {
      background: var(--white);
      padding: 1.25rem;
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid rgba(0,0,0,0.04);
      animation: fadeUp 0.4s ease-out both;
    }

    .dash-card--wide { grid-column: 1 / -1; }

    .dash-card h3 {
      font-family: var(--sans);
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--pink);
      margin-bottom: 0.75rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid rgba(0,0,0,0.08);
    }

    .dash-card-body {
      font-size: 0.88rem;
      line-height: 1.55;
      color: var(--ink-soft);
    }

    .dash-card-body h3 {
      font-family: var(--sans);
      font-size: 0.88rem;
      font-weight: 700;
      color: var(--ink);
      text-transform: none;
      letter-spacing: 0;
      border-bottom: none;
      padding-bottom: 0;
      margin-top: 1rem;
      margin-bottom: 0.35rem;
    }

    .dash-card-body h3:first-child { margin-top: 0; }

    .dash-card-body p { margin-bottom: 0.6rem; }
    .dash-card-body strong { color: var(--ink); }

    .dash-card-body ul, .dash-card-body ol {
      padding-left: 1.1rem;
      margin-bottom: 0.6rem;
    }

    .dash-card-body li { margin-bottom: 0.25rem; font-size: 0.85rem; }

    .dash-card-body blockquote {
      border-left: 3px solid var(--pink-soft);
      padding: 0.5rem 0.8rem;
      margin: 0.6rem 0;
      background: var(--pink-glow);
      font-style: italic;
      font-size: 0.85rem;
      color: var(--ink-muted);
      border-radius: 0 6px 6px 0;
    }

    .dash-card-body hr { display: none; }

    .dash-card-body code {
      font-size: 0.82em;
      background: rgba(0,0,0,0.04);
      padding: 0.15em 0.4em;
      border-radius: 4px;
    }

    .dash-card-body pre {
      background: var(--ink);
      color: var(--mint);
      padding: 0.75rem;
      overflow-x: auto;
      margin-bottom: 0.6rem;
      font-size: 0.8rem;
      border-radius: 8px;
    }

    .dash-card-body pre code { background: none; padding: 0; color: inherit; }

    /* Full transcript toggle */
    .full-transcript {
      margin-top: 1.5rem;
    }

    .full-transcript summary {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--ink-muted);
      cursor: pointer;
      padding: 0.75rem 1rem;
      background: rgba(255,255,255,0.4);
      border-radius: 10px;
      transition: color 0.15s, background 0.15s;
    }

    .full-transcript summary:hover {
      color: var(--pink);
      background: rgba(255,255,255,0.6);
    }

    .full-transcript .session-content {
      background: var(--white);
      padding: 2rem;
      margin-top: 0.5rem;
      border-radius: 10px;
    }

    /* Session content (inside transcript) */
    .session-content h1 { display: none; }

    .session-content h2 {
      font-family: var(--serif);
      font-size: 1.05rem;
      color: var(--ink);
      margin-top: 2rem;
      margin-bottom: 0.75rem;
      padding-bottom: 0.35rem;
      border-bottom: 1px solid rgba(0,0,0,0.1);
    }

    .session-content h3 {
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--ink);
      margin-top: 1.25rem;
      margin-bottom: 0.4rem;
    }

    .session-content p {
      margin-bottom: 0.75rem;
      color: var(--ink-soft);
    }

    .session-content strong { color: var(--ink); }

    .session-content ul, .session-content ol {
      margin-bottom: 0.75rem;
      padding-left: 1.25rem;
    }

    .session-content li { margin-bottom: 0.3rem; }

    .session-content blockquote {
      border-left: 3px solid var(--pink-soft);
      padding: 0.5rem 1rem;
      margin: 0.75rem 0;
      font-style: italic;
      color: var(--ink-muted);
      border-radius: 0 6px 6px 0;
    }

    .session-content a { color: var(--pink); }

    .session-content hr {
      border: none;
      border-top: 1px solid rgba(0,0,0,0.08);
      margin: 1.5rem 0;
    }

    /* Workshop content */
    .workshop-content {
      background: var(--white);
      padding: 2rem;
      border-radius: 12px;
      border: 1px solid rgba(0,0,0,0.04);
      animation: fadeUp 0.4s ease-out 0.2s both;
    }

    .workshop-content h2 {
      font-family: var(--serif);
      font-size: 1.1rem;
      color: var(--ink);
      margin-top: 2rem;
      margin-bottom: 0.75rem;
    }

    .workshop-content h2:first-child { margin-top: 0; }

    .workshop-content h3 {
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--ink);
      margin-top: 1.25rem;
      margin-bottom: 0.35rem;
    }

    .workshop-content p {
      margin-bottom: 0.75rem;
      color: var(--ink-soft);
      line-height: 1.6;
    }

    .workshop-content strong { color: var(--ink); }

    .workshop-content ul {
      padding-left: 1.25rem;
      margin-bottom: 0.75rem;
    }

    .workshop-content li {
      margin-bottom: 0.35rem;
      color: var(--ink-soft);
    }

    .keyword-list {
      display: flex;
      flex-wrap: wrap;
      gap: 0.35rem;
      margin-top: 0.75rem;
    }

    .keyword {
      font-size: 0.75rem;
      font-weight: 500;
      padding: 0.2rem 0.65rem;
      background: var(--mint-light);
      border-radius: 999px;
      color: var(--ink-soft);
    }

    /* Staggered animation for activity items */
    .activity-list li:nth-child(1) .activity-card { animation: fadeUp 0.4s ease-out 0.1s both; }
    .activity-list li:nth-child(2) .activity-card { animation: fadeUp 0.4s ease-out 0.18s both; }
    .activity-list li:nth-child(3) .activity-card { animation: fadeUp 0.4s ease-out 0.26s both; }
    .activity-list li:nth-child(4) .activity-card { animation: fadeUp 0.4s ease-out 0.34s both; }
    .activity-list li:nth-child(5) .activity-card { animation: fadeUp 0.4s ease-out 0.42s both; }
    .activity-list li:nth-child(n+6) .activity-card { animation: fadeUp 0.4s ease-out 0.5s both; }

    /* Bottom decorative blob */
    .container::after {
      content: '';
      position: fixed;
      bottom: -100px;
      left: -60px;
      width: 300px;
      height: 300px;
      background: radial-gradient(ellipse at center, rgba(129,215,192,0.15) 0%, transparent 70%);
      border-radius: 50%;
      pointer-events: none;
      z-index: -1;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="site-title"><a href="{{ '/' | relative_url }}">Scenius Infra Upgrade</a></div>
      <div class="site-desc">{{ site.description }}</div>
      <a href="https://github.com/sensemaking-scenius/scenius-infra-upgrade" class="github-link" target="_blank" rel="noopener">
        <svg viewBox="0 0 16 16" aria-hidden="true"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
        View on GitHub
      </a>
    </header>
    <main>
      {{ content }}
    </main>
  </div>
</body>
</html>
